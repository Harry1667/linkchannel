<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>LinkChannel</title>
  <!-- Open Graph / Social Preview -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="My Works">
  <meta property="og:description" content="作品集連結頁 — 瀏覽我的所有專案">
  <meta property="og:url" content="">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="My Works">
  <meta name="twitter:description" content="作品集連結頁 — 瀏覽我的所有專案">
  <!-- 主題必須在 CSS 載入前設定，避免閃爍 -->
  <script>(function(){var t=localStorage.getItem('themeOverride')||(window.matchMedia('(prefers-color-scheme: light)').matches?'light':'dark');document.documentElement.dataset.theme=t;})()</script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Background -->
<div id="bg"></div>

<!-- Status Bar -->
<div id="statusbar">
  <div class="time">00:00</div>
  <div class="icons">
    <svg width="16" height="12" viewBox="0 0 16 12" fill="white">
      <rect x="0" y="4" width="3" height="8" rx="1" opacity="0.4"/>
      <rect x="4.5" y="2.5" width="3" height="9.5" rx="1" opacity="0.6"/>
      <rect x="9" y="0.5" width="3" height="11.5" rx="1" opacity="0.8"/>
      <rect x="13.5" y="0" width="2.5" height="12" rx="1"/>
    </svg>
    <svg width="16" height="12" viewBox="0 0 24 12" fill="white">
      <rect x="0" y="0" width="20" height="12" rx="3" stroke="white" stroke-width="1.5" fill="none"/>
      <rect x="21.5" y="3.5" width="2.5" height="5" rx="1" fill="white" opacity="0.6"/>
      <rect x="1.5" y="1.5" width="14" height="9" rx="2" fill="white"/>
    </svg>
  </div>
</div>

<!-- Main App -->
<div id="app">
  <!-- Slider -->
  <div id="slider-wrapper">
    <div id="slider"></div>
  </div>
</div>

<!-- Page Dots -->
<div id="page-dots"></div>

<!-- Folder Modal -->
<div id="folder-modal">
  <div class="modal-backdrop"></div>
  <div class="modal-content">
    <div class="modal-title">資料夾</div>
    <div class="folder-grid"></div>
  </div>
</div>

<!-- Copy Link Button -->
<button id="copy-btn" onclick="copyLink()" title="複製連結">
  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
  </svg>
</button>

<!-- Edit Mode Done Button -->
<button id="edit-done-btn" onclick="exitEditMode()" style="display:none">完成</button>

<!-- Dock -->
<div id="dock">
  <!-- Add -->
  <div class="app-icon" id="dock-add" onclick="showAddMenu()">
    <div class="icon-wrap" style="background:linear-gradient(135deg,#5e5ce6,#7b79f5)">
      <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </div>
    <div class="icon-label">新增</div>
  </div>
  <!-- Settings -->
  <div class="app-icon" id="dock-settings" onclick="openAdmin()">
    <div class="icon-wrap" style="background:linear-gradient(135deg,#636366,#8e8e93)">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </div>
    <div class="icon-label">設定</div>
  </div>
  <!-- Security -->
  <div class="app-icon" id="dock-security" onclick="openSecurityPanel()">
    <div class="icon-wrap" style="background:linear-gradient(135deg,#ff9500,#ff6b00)">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    <div class="icon-label">安全</div>
  </div>
</div>

<!-- Add Menu (bottom sheet) -->
<div id="add-menu">
  <div id="add-menu-backdrop" onclick="hideAddMenu()"></div>
  <div id="add-menu-sheet">
    <div class="add-menu-title">新增到第 <span id="add-menu-page-num">1</span> 頁</div>
    <button class="add-menu-btn" onclick="addItemFromMenu('app')">
      <span class="add-menu-icon">🔗</span><span>新增網站</span>
    </button>
    <button class="add-menu-btn" onclick="addItemFromMenu('folder')">
      <span class="add-menu-icon">📁</span><span>新增資料夾</span>
    </button>
    <button class="add-menu-btn add-menu-cancel" onclick="hideAddMenu()">取消</button>
  </div>
</div>

<!-- Security Modal -->
<div id="security-modal" class="modal-overlay">
  <div class="modal-box">
    <h2>安全設定</h2>
    <div class="toggle-row">
      <label>啟用訪問密碼</label>
      <label class="toggle">
        <input type="checkbox" id="sec-pw-enabled">
        <span class="toggle-slider"></span>
      </label>
    </div>
    <div class="form-group" style="margin-top:16px">
      <label>密碼</label>
      <input type="password" id="sec-pw-value" placeholder="設定訪問密碼">
    </div>
    <div style="display:flex;gap:10px;margin-top:8px">
      <button class="btn btn-primary" onclick="saveSecurity()" style="flex:1">儲存</button>
      <button class="btn btn-ghost" onclick="closeSecurityPanel()">取消</button>
    </div>
  </div>
</div>

<!-- Admin Panel -->
<div id="admin-panel">
  <div id="admin-header">
    <h1>管理後台</h1>
    <button class="btn btn-ghost btn-sm" onclick="closeAdmin()">關閉</button>
  </div>
  <div id="admin-body"></div>
</div>

<!-- Item Edit Modal -->
<div class="modal-overlay" id="item-modal">
  <div class="modal-box"></div>
</div>

<!-- Password Screen -->
<div id="password-screen" style="display:none">
  <h2>🔒 請輸入密碼</h2>
  <p>此頁面已啟用密碼保護</p>
  <input type="password" id="pw-input" placeholder="••••••">
  <div class="error-msg" id="pw-error"></div>
  <button class="btn btn-primary" id="pw-submit">確認</button>
</div>

<!-- Toast -->
<script src="js/app.js"></script>
</body>
</html>
